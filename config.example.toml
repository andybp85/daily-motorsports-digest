# Copy to config.toml and fill in, or set the matching env vars.
model = "claude-haiku-4-5"
threshold = 0.0            # ignored while calibration = true
calibration = true         # send every day + log scores until tuned
suppress_days = 3
escalation_factor = 1.5
db_path = "state.db"
timezone = "America/New_York"
max_stories = 15

# Priority tiers: each reserves a floor of slots (a minimum, not a cap), applied
# top-down, then remaining slots fill by buzz across everything. A series named
# in no tier has floor 0 — it competes only in the buzz fill. Summed floors must
# be <= max_stories. See "Series registry" below for the ids.
[[tier]]                                              # 1st: the headline series
series = ["f1", "indycar"]
floor = 6
[[tier]]                                              # 2nd: feeder ladders
series = ["f2", "f3", "f1academy", "indynxt"]
floor = 3
[[tier]]                                              # 3rd
series = ["wec", "formulae"]
floor = 2
[[tier]]                                              # 4th
series = ["nascar", "imsa"]
floor = 2

# Reddit is an optional ranking signal. As of late 2025 Reddit gates new API
# tokens behind manual approval (Responsible Builder Policy), so self-serve app
# creation may be unavailable. Set false to skip Reddit entirely and run on
# RSS + GDELT. Leaving it true but omitting REDDIT_* env vars also skips it.
reddit_enabled = true

# Bluesky enrichment: scores each story by how much its article is shared on
# Bluesky. Needs BSKY_HANDLE + BSKY_APP_PASSWORD in .env. Disabled by default.
bluesky_enabled = false

[weights]
social = 0.5
breadth = 0.35
spike = 0.15

[ses]
sender = "digest@example.com"
recipient = "you@example.com"
aws_region = "us-east-1"

[[rss_feeds]]
url = "https://www.autosport.com/rss/feed/all"
series = ""                # "" = classify each entry by title

[[rss_feeds]]
url = "https://www.the-race.com/feed/"
series = ""

[[rss_feeds]]
url = "https://www.motorsport.com/rss/all/news/"
series = ""

[[rss_feeds]]
url = "https://racer.com/feed/"
series = "indycar"

[[subreddits]]
name = "formula1"
series = "f1"

[[subreddits]]
name = "IndyCar"
series = "indycar"

# Series registry — order is classification priority: a title matching two
# series resolves to the earlier one. Feeder ladders are listed BEFORE their
# parent so a specific hit wins — e.g. "F1 Academy" must classify as f1academy,
# not f1 (whose "F1" term is a substring of it). See docs bean 98y5 on residual
# term collisions (bare "F2"/"F3").
[[series]]
id = "f2"
label = "Formula 2"
terms = ["Formula 2", "FIA F2", "F2"]

[[series]]
id = "f3"
label = "Formula 3"
terms = ["Formula 3", "FIA F3", "F3"]

[[series]]
id = "f1academy"
label = "F1 Academy"
terms = ["F1 Academy"]

[[series]]
id = "indynxt"
label = "Indy NXT"
terms = ["Indy NXT", "Indy Lights"]

[[series]]
id = "f1"
label = "Formula 1"
# Driver names are given in full. These terms are also the GDELT search keywords
# (see build_keyword_list), and GDELT is general world news — a bare surname
# queries for every Hamilton, Russell, Norris, Alonso and Leclerc on earth, and
# is_relevant() can't filter them back out because it re-checks this same list.
terms = ["Formula 1", "Formula One", "F1", "Grand Prix",
         "Verstappen", "Piastri", "Lewis Hamilton", "Lando Norris",
         "Charles Leclerc", "George Russell", "Fernando Alonso",
         "Red Bull Racing", "Scuderia Ferrari"]

[[series]]
id = "indycar"
label = "IndyCar"
# Penske and Ganassi are deliberately absent: both field NASCAR and IMSA entries,
# so as GDELT keywords they drag those series in (Blaney drives a Penske).
terms = ["IndyCar", "Indy 500", "Indianapolis 500",
         "Palou", "Newgarden", "Scott Dixon", "Herta", "O'Ward"]

[[series]]
id = "wec"
label = "WEC"
terms = ["WEC", "World Endurance", "Le Mans", "Hypercar", "LMGT3",
         "6 Hours of", "499P", "Toyota Gazoo", "Peugeot 9X8"]

[[series]]
id = "imsa"
label = "IMSA"
terms = ["IMSA", "WeatherTech", "GTP", "Rolex 24", "Daytona 24",
         "Sebring", "Petit Le Mans"]

[[series]]
id = "nascar"
label = "NASCAR"
terms = ["NASCAR", "Cup Series", "Xfinity", "Craftsman Truck",
         "Daytona 500", "Talladega", "Bristol", "Larson", "Elliott"]

[[series]]
id = "formulae"
label = "Formula E"
terms = ["Formula E", "E-Prix", "Gen3", "ABB FIA"]
